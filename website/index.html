<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Theme: apply before first paint to prevent flash -->
    <script>
      (function () {
        var stored = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        if (stored === "dark" || (!stored && prefersDark)) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.reactfill.com/" />
    <meta name="description" content="ReactFill — Schema-driven dynamic form builder for React. CSS-framework agnostic. Zero boilerplate. Powered by React Hook Form." />
    <meta property="og:title" content="ReactFill" />
    <meta property="og:url" content="https://www.reactfill.com/" />
    <meta property="og:type" content="website" />
    <meta property="og:description" content="Pass a JSON schema. Get a fully functional form. Works with any CSS framework." />
    <title>ReactFill — Forms without the boilerplate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
